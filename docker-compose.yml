services:
  db:
    image: postgres:16-alpine
    container_name: letho-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: letho
      POSTGRES_PASSWORD: letho_dev_password
      POSTGRES_DB: letho_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U letho -d letho_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: letho-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://letho:letho_dev_password@db:5432/letho_db
      - NODE_ENV=development
    volumes:
      # Mount source code for hot-reload
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run dev"

volumes:
  postgres_data:
